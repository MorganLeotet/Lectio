services:

  db:
    image: postgres:15
    container_name: lectio-db
    restart: always
    environment:
      POSTGRES_USER: lectio
      POSTGRES_PASSWORD: lectio
      POSTGRES_DB: lectio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
  build: .
  container_name: lectio-app
  restart: always
  ports:
    - "3000:3000"

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  depends_on:
    - db

  environment:
    DB_HOST: db
    DB_USER: lectio
    DB_PASSWORD: lectio
    DB_NAME: lectio
    DB_PORT: 5432

volumes:
  postgres_data: