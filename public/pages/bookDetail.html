<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectio - Détail Livre</title>
    <link rel="stylesheet" href="../css/lectio.css">
    
</head>
<body>
<!--- ======= HEADER ====== -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="../assets/img/logo/logo.svg" alt="logo Lectio" class="topbar-logo">
        </div>
        <div class="topbar-right">
            <a href="login.html" class="btn-connexion">Connexion</a>
            <button class="accessibility-toggle" aria-label="Activer le Mode Accessibilité">
                <img src="../assets/img/icons/handicap.svg" alt="logo Mode Accessibilité" class="accesibility-icon">
            </button>
        </div>
    </header>
<!-- FIL D’ARIANE -->
    <nav class="breadcrumb">
        <a href="#">Accueil</a> &gt;
        <a href="#">Catalogue</a> &gt;
        <span>Livre</span>
    </nav>
<!-- ==== MOTEUR DE RECHERCHE ==== -->
        <section class="search">
            <div class="search-bar">
                <span class="search-icon">☰</span>
                <input type="search" placeholder="Rechercher par Livre, Auteur, Genre" aria-label="Recherche par livre, auteur ou genre">
                <span class="search-icon">🔍</span>
            </div>
        </section>
<!-- =========== MAIN =========== -->
<section class="book-wrapper">
    <div class="book-container">
        <div class="book-cover">
            <img src="#" alt="couverture du livre"> 
        </div>
        <div class="book-info">
            <h1>Titre du livre</h1>
            <p><strong>Auteur:</strong></p>
            <p><strong>Date de publication:</strong></p>
            <p><strong>Editeur:</strong></p>
            <p><strong>Genre:</strong></p>
            <p><strong>Âge du lecteur:</strong></p>
            <p><strong>Nombre de pages:</strong></p>
            <p><strong>ISBN:</strong></p>
        </div>
    </div>
</section>
<section class="book-summary">
    <p>résumé du livre</p>
</section>
<!--- ==== FOOTER ==== -->
    <footer class="footer">
        <span>LECTIO ® 2026</span>
        <a href="mentions.html">Mentions Légales</a>
        <a href="accesibility.html">Mode accessibilité</a>
    </footer>

<script src="../js/accessibility.js"></script>

</body>
</html>
