<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectio - Détail Livre</title>
    <link rel="stylesheet" href="../css/lectio.css">
    
</head>
<body>
<!--- ======= HEADER ====== -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="../assets/logo/logo.svg" alt="logo Lectio" class="topbar-logo">
        </div>
        <div class="topbar-right">
            <button id="openLogin">Connexion</button>
            <button class="accessibility-toggle" aria-label="Activer le Mode Accessibilité">
                <img src="../assets/icons/handicap.svg" alt="logo Mode Accessibilité" class="accesibility-icon">
            </button>
        </div>
    </header>
<!-- FIL D’ARIANE -->
    <nav class="breadcrumb">
        <a href="/pages/home.html">Accueil</a> &gt;
        <span>Livre</span>
    </nav>
<!-- ==== MOTEUR DE RECHERCHE ==== -->
        <section class="search">
            <div class="search-bar">
                <span class="search-icon">☰</span>
                <input type="search" placeholder="Rechercher par Livre, Auteur, Genre" aria-label="Recherche par livre, auteur ou genre">
                <span class="search-icon">🔍</span>
            </div>
        </section>
<!-- =========== MAIN =========== -->
    <main class="page">
        <div class="container">
            <section class="book-wrapper">
                <div class="book-container">
                    <div class="book-cover">
                        <img src="#" alt="couverture du livre"> 
                    </div>
                    <div class="book-info">
                        <h1>Titre du livre</h1>
                        <p><strong>Auteur:</strong></p>
                        <p><strong>Date de publication:</strong></p>
                        <p><strong>Editeur:</strong></p>
                        <p><strong>Genre:</strong></p>
                        <p><strong>Âge du lecteur:</strong></p>
                        <p><strong>Nombre de pages:</strong></p>
                        <p><strong>ISBN:</strong></p>
                    </div>
                </div>
            </section>
            <section class="book-summary">
                <p>résumé du livre</p>
            </section>
        </div>
    </main>
<!--- ==== FOOTER ==== -->
    <footer class="footer">
        <span>LECTIO ® 2026</span>
        <a href="mentions.html">Mentions Légales</a>
        <a href="accesibility.html">Mode accessibilité</a>
    </footer>

<div id="loginContainer"></div>

<script src="../js/accessibility.js"></script>
<script src="../js/login.js"></script>
<script src="../js/loadLogin.js"></script>

</body>
</html>
