<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectio - Ma Bibliothèque</title>
    <link rel="stylesheet" href="../css/lectio.css">
</head>
<body>
    <!--- ======= HEADER ====== -->
    <header class="header">
        <div class="header-left">
            <button class="user-btn open-login">👤</button>
            <img src="../assets/logo/logo.svg" alt="logo Lectio" class="logo">
        </div>
<!-- ==== MOTEUR DE RECHERCHE ==== -->
        <div class="header-center">
            <div class="search-bar">
                <span class="search-icon">☰</span>
                <input type="search" placeholder="Rechercher par Livre, Auteur, Genre" aria-label="Recherche par livre, auteur ou genre">
                <span class="search-icon">🔍</span>
            </div>
        </div>
        <div class="header-right">
            <button class="glass-icon">🔍</button>
            <button class="open-login">Connexion</button>
            <button class="accessibility-toggle" aria-label="Activer le Mode Accessibilité">
                <img src="../assets/icons/handicap.svg" alt="logo Mode Accessibilité" class="accesibility-icon">
            </button>
        </div>
    </header>
    <div class="mobile-search" id="mobile-search">
        <div class="mobile-search-content">
            <input type="search" placeholder="Rechercher par Livre, Auteur, Genre" aria-label="Recherche par livre, auteur ou genre">
        </div>
    </div>
    <!-- ======= MAIN ========= -->
    <main class="page page-library">
        <div class="container">
            <h1 id="libraryTitle">Nom de la bibliothèque</h1>

            <div class="library_menu">
                <button data-filter="all">Tous</button>
                <button data-filter="a_lire">A Lire</button>
                <button data-filter="en_cours">En Cours</button>
                <button data-filter="lu">Lu</button>
                <button data-filter="favorites">Coup de Coeur</button>
            </div>
            <div class="library_grid" id="libraryGrid"></div>
        </div>

    </main>
    
<script type="module" src="../js/lectio.js"></script>
</body>
</html>
