<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectio - Ma Bibliothèque</title>
    <link rel="stylesheet" href="../css/lectio.css">
</head>
<body>
    <!--- ======= HEADER ====== -->
    <header class="topbar">
        <div class="topbar-left">
            <img src="../assets/logo/logo.svg" alt="logo Lectio" class="topbar-logo">
        </div>
        <div class="topbar-right">
            <span class="welcome">Nom du user connecté</span>
            <button class="accessibility-toggle" aria-label="Activer le Mode Accessibilité">
                <img src="../assets/icons/handicap.svg" alt="logo Mode Accessibilité" class="accesibility-icon">
            </button>
        </div>
    </header>
    <!-- ==== MOTEUR DE RECHERCHE ==== -->
        <section class="search">
            <div class="search-bar">
                <span class="search-icon">☰</span>
                <input type="search" placeholder="Rechercher par Livre, Auteur, Genre" aria-label="Recherche par livre, auteur ou genre">
                <span class="search-icon">🔍</span>
            </div>
        </section>
    <!-- ======= MAIN ========= -->
    <main class="library-page">
        <h1 id="libraryTitle">Nom de la bibliothèque</h1>

        <div class="library_menu">
            <button data-filter="all">Tous</button>
            <button data-filter="a_lire">A Lire</button>
            <button data-filter="en_cours">En Cours</button>
            <button data-filter="lu">Lu</button>
            <button data-filter="favorites">Coup de Coeur</button>
        </div>
        <div class="library_grid" id="libraryGrid"></div>

    </main>
    
<script src="../js/accessibility.js"></script>
<script src="../js/library.js"></script>
</body>
</html>
