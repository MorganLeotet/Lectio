<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectio - Ma Bibliothèque</title>
    <link rel="stylesheet" href="../css/lectio.css">
</head>
<body>
<!-- =========================== HEADER ========================= -->
<header class="site-header">
    <div class="header-container">

        <!-- Icône user (mobile uniquement) -->
        <button class="mobile-user">👤</button>

        <!-- Logo -->
        <a href="index.html" class="logo">
        <img src="../assets/logo/logo.svg" alt="Logo Lectio">
        </a>

        <!-- Recherche -->
        <form class="search-bar">
            <span class="burger">☰</span>
            <input type="text" placeholder="Rechercher par livre, auteur, genre">
            <button type="submit">🔍</button>
        </form>

        <!-- Zone utilisateur -->
        <div class="user-area">

        <!-- Message connecté (caché par défaut) -->
        <div class="user-info hidden">
            <span class="welcome-text">Bienvenue, Morgan !</span>
            <button class="logout-btn">Déconnexion</button>
        </div>

        <!-- BLOC A DROITE -->
        <div class="header-actions"></div>
            <button class="login-btn">Connexion</button>
            <button class="mobile-search">🔍</button>
            <button class="accessibility-toggle" aria-label="Mode accessibilité">
                <img src="../assets/icons/handicap.svg">
            </button>
        </div>
    </div>
</header>
    <!-- ======= MAIN ========= -->
    <main class="page page-library">
        <h1 id="libraryTitle">Nom de la bibliothèque</h1>
        <div class="library_menu">
            <button data-filter="all">Tous</button>
            <button data-filter="a_lire">A Lire</button>
            <button data-filter="en_cours">En Cours</button>
            <button data-filter="lu">Lu</button>
            <button data-filter="favorites">Coup de Coeur</button>
        </div>

        <div class="library-grid" id="libraryGrid"></div>
    </main>
    <!--- ==== FOOTER ==== -->
    <footer class="footer">
        <span>LECTIO ® 2026</span>
        <a href="mentions.html">Mentions Légales</a>
        <a href="accesibility.html">Mode accessibilité</a>
    </footer>
<script type="module" src="../js/lectio.js"></script>
</body>
</html>
